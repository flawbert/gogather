spring:
  application:
    name: GoGather
  config:
    import: classpath:secret.yaml
  datasource:
    url: jdbc:postgresql://localhost:5432/GoGather
    username: ${db.username}
    password: ${db.password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  api:
    security:
      token:
        secret: ${token.secret}
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
google:
  places:
    api-key: ${GOOGLE_PLACES_API_KEY}
